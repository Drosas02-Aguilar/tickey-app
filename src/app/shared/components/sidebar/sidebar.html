<aside class="ta-sidebar">
  <!-- Logo / Cabecera -->
  <div class="ta-sidebar__header">
    <span class="ta-sidebar__logo">
      <i class="bi bi-kanban"></i>
      Menú
    </span>
  </div>

  <!-- Navegación principal -->
  <nav class="ta-sidebar__nav">
    <!-- Mis Tickets -->
    <a
      (click)="navegarA('/mis-tickets', $event)"
      [class.active]="router.url === '/mis-tickets'"
      class="ta-sidebar__link"
    >
      <i class="bi bi-person"></i>
      <span>Mis Tickets</span>
    </a>

    <!-- Tickets Asignados -->
    <a
      (click)="navegarA('/tickets-asignados', $event)"
      [class.active]="router.url === '/tickets-asignados'"
      class="ta-sidebar__link"
    >
      <i class="bi bi-ticket-detailed"></i>
      <span>Tickets Asignados</span>
    </a>

    <!-- Nuevo Ticket -->
    <a
      (click)="navegarA('/tickets/nuevo', $event)"
      [class.active]="router.url === '/tickets/nuevo'"
      class="ta-sidebar__link"
    >
      <i class="bi bi-plus-circle"></i>
      <span>Nuevo Ticket</span>
    </a>

    <!-- Separador -->
    <div class="ta-sidebar__divider"></div>

    <!-- Todos los Tickets (Admin/Agente) -->
    @if (esAdminOAgente()) {
      <a
        (click)="navegarA('/tickets', $event)"
        [class.active]="router.url === '/tickets'"
        class="ta-sidebar__link"
      >
        <i class="bi bi-ticket-perforated"></i>
        <span>Todos los Tickets</span>
      </a>
    }

    <!-- Gestión de Usuarios (Admin/Agente) -->
    @if (esAdminOAgente()) {
      <a
        (click)="navegarA('/usuarios', $event)"
        [class.active]="router.url === '/usuarios'"
        class="ta-sidebar__link"
      >
        <i class="bi bi-people"></i>
        <span>Usuarios</span>
      </a>
    }

    <!-- Nuevo Usuario (Solo Admin) -->
    @if (esAdmin()) {
      <a
        (click)="navegarA('/usuarios/nuevo', $event)"
        [class.active]="router.url === '/usuarios/nuevo'"
        class="ta-sidebar__link"
      >
        <i class="bi bi-person-plus"></i>
        <span>Nuevo Usuario</span>
      </a>
    }
  </nav>

  <!-- Footer con info del usuario -->
  <div class="ta-sidebar__footer">
    <div class="ta-sidebar__user">
      <div class="ta-sidebar__user-avatar">
        <i class="bi bi-person-circle"></i>
      </div>
      <div class="ta-sidebar__user-info">
        <span class="ta-sidebar__user-name">{{ username }}</span>
        <span class="ta-sidebar__user-role">{{ rolFormateado }}</span>
      </div>
    </div>
    <div class="ta-sidebar__version">
      <i class="bi bi-shield-check"></i>
      v1.0.0
    </div>
  </div>
</aside>
