<div class="app-wrapper d-flex vh-100 overflow-hidden">

  <div class="sidebar-overlay" 
       [class.show]="sidebarAbierto" 
       (click)="toggleSidebar()">
  </div>

  <app-sidebar [class.mobile-open]="sidebarAbierto"></app-sidebar>

  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <app-navbar (toggleSidebar)="toggleSidebar()"></app-navbar>

    <div class="page-container flex-grow-1 overflow-auto bg-light"
         [class.cargando]="cargando">

      @if (cargando) {
        <div class="global-loader">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </div>
      }

      <div class="page-content">
        <router-outlet></router-outlet>
      </div>
    </div>

    <footer class="bg-white border-top py-2 px-4">
      <div class="d-flex justify-content-between align-items-center">
        <small class="text-muted">
          <i class="bi bi-c-circle me-1"></i>2025 TicketApp - v1.0.0
        </small>
        <small class="text-muted">
          <i class="bi bi-shield-check me-1"></i>
          Sesión: {{ tiempoSesion }}
        </small>
      </div>
    </footer>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  @for (toast of toasts; track toast.id) {
    <div class="toast show" [class]="'bg-' + toast.type" role="alert">
      <div class="toast-header">
        <i [class]="'bi bi-' + toast.icon + ' me-2'"></i>
        <strong class="me-auto">{{ toast.title }}</strong>
        <small>{{ toast.time }}</small>
        <button type="button" class="btn-close" (click)="cerrarToast(toast.id)"></button>
      </div>
      <div class="toast-body text-white">
        {{ toast.message }}
      </div>
    </div>
  }
</div>
