<div class="ta-layout" [class.ta-layout--sidebar-open]="sidebarAbierto">
  <!-- Overlay para móvil cuando el sidebar está abierto -->
  <div
    class="ta-layout__overlay"
    [class.ta-layout__overlay--visible]="sidebarAbierto"
    (click)="toggleSidebar()"
  ></div>

  <!-- Sidebar -->
  <app-sidebar [class.ta-sidebar--mobile-open]="sidebarAbierto"></app-sidebar>

  <!-- Contenido principal -->
  <div class="ta-layout__main">
    <!-- Navbar -->
    <app-navbar (toggleSidebar)="toggleSidebar()"></app-navbar>

    <!-- Área de contenido con loader global -->
    <div class="ta-page-container" [class.ta-page-container--loading]="cargando">
      <!-- Loader global -->
      @if (cargando) {
        <div class="ta-page-loader">
          <div class="ta-spinner ta-spinner--large"></div>
          <span class="ta-page-loader__text">Cargando...</span>
        </div>
      }

      <!-- Contenido de la página -->
      <div class="ta-page-content">
        <router-outlet></router-outlet>
      </div>
    </div>

    <!-- Footer -->
    <footer class="ta-footer">
      <div class="ta-footer__left">
        <i class="bi bi-c-circle"></i>
        <span>2025 TicketApp - v1.0.0</span>
      </div>
      <div class="ta-footer__right">
        <i class="bi bi-shield-check"></i>
        <span>Sesión: {{ tiempoSesion }}</span>
      </div>
    </footer>
  </div>
</div>

<!-- Contenedor de Toasts -->
<div class="ta-toast-container">
  @for (toast of toasts; track toast.id) {
    <div
      class="ta-toast"
      [class.ta-toast--success]="toast.type === 'success'"
      [class.ta-toast--error]="toast.type === 'danger'"
      [class.ta-toast--warning]="toast.type === 'warning'"
      [class.ta-toast--info]="toast.type === 'info'"
    >
      <div class="ta-toast__header">
        <div class="ta-toast__header-left">
          <i [class]="'bi bi-' + toast.icon"></i>
          <strong>{{ toast.title }}</strong>
        </div>
        <div class="ta-toast__header-right">
          <small>{{ toast.time }}</small>
          <button class="ta-toast__close" (click)="cerrarToast(toast.id)">
            <i class="bi bi-x"></i>
          </button>
        </div>
      </div>
      <div class="ta-toast__body">
        {{ toast.message }}
      </div>
    </div>
  }
</div>
