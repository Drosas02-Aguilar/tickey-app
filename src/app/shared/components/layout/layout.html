<div class="app-wrapper d-flex vh-100 overflow-hidden">
  <!-- Overlay para móvil cuando el sidebar está abierto -->
  <div class="sidebar-overlay" 
       [class.show]="sidebarAbierto" 
       (click)="toggleSidebar()">
  </div>

  <!-- Sidebar -->
  <app-sidebar [class.mobile-open]="sidebarAbierto"></app-sidebar>

  <!-- Contenido principal -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">
    <!-- Navbar -->
    <app-navbar (toggleSidebar)="toggleSidebar()"></app-navbar>

    <!-- Contenedor de página con scroll -->
    <div class="page-container flex-grow-1 overflow-auto bg-light">
      <!-- Loading global -->
      @if (cargando) {
        <div class="global-loader">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </div>
      }

      <!-- Contenido dinámico -->
      <div class="page-content">
        <router-outlet></router-outlet>
      </div>
    </div>

    <!-- Footer opcional -->
    <footer class="bg-white border-top py-2 px-4">
      <div class="d-flex justify-content-between align-items-center">
        <small class="text-muted">
          <i class="bi bi-c-circle me-1"></i>2025 TicketApp - v1.0.0
        </small>
        <small class="text-muted">
          <i class="bi bi-shield-check me-1"></i>
          Sesión: {{ tiempoSesion }}
        </small>
      </div>
    </footer>
  </div>
</div>

<!-- Modal de confirmación para cerrar sesión -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-box-arrow-right me-2 text-danger"></i>
          Cerrar Sesión
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="mb-0">¿Estás seguro que deseas cerrar la sesión?</p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
          <i class="bi bi-x-circle me-1"></i>Cancelar
        </button>
        <button type="button" class="btn btn-danger" (click)="confirmarLogout()" data-bs-dismiss="modal">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast para notificaciones -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  @for (toast of toasts; track toast.id) {
    <div class="toast show" [class]="'bg-' + toast.type" role="alert">
      <div class="toast-header">
        <i [class]="'bi bi-' + toast.icon + ' me-2'"></i>
        <strong class="me-auto">{{ toast.title }}</strong>
        <small>{{ toast.time }}</small>
        <button type="button" class="btn-close" (click)="cerrarToast(toast.id)"></button>
      </div>
      <div class="toast-body text-white">
        {{ toast.message }}
      </div>
    </div>
  }
</div>
